<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>H2HCHIVE Archive</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f7f7f7;
    color:#111;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.header{
    position:sticky;
    top:0;
    background:#fff;
    border-bottom:1px solid #e5e5e5;
    padding:20px;
    text-align:center;
    z-index:100;
}

.header h1{
    font-size:24px;
    font-weight:700;
    letter-spacing:1px;
}

.filter-buttons{
    margin-top:12px;
    display:flex;
    justify-content:center;
    gap:8px;
}

.filter-buttons button{
    padding:8px 14px;
    border:1px solid #ddd;
    background:#fff;
    border-radius:999px;
    font-size:13px;
    cursor:pointer;
    transition:0.2s;
}

.filter-buttons button:hover{
    background:#111;
    color:#fff;
    border-color:#111;
}

.archive-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
    padding:20px;
    max-width:1200px;
    margin:0 auto;
}

.archive-card{
    display:block;
    text-decoration:none;
    color:inherit;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    border:1px solid #e5e5e5;
    transition:0.2s;
}

.archive-card:hover{
    transform:translateY(-2px);
}

.archive-thumb{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    display:block;
}

.archive-content{
    padding:12px;
}

.archive-title{
    font-size:14px;
    font-weight:600;
    line-height:1.4;
    margin-bottom:8px;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.archive-date{
    font-size:12px;
    color:#777;
}
</style>
</head>

<body>

<header class="header">
    <h1>ARCHIVE</h1>

    <div class="filter-buttons">
        <button onclick="showAlbum('all')">전체</button>
        <button onclick="showAlbum('The Chase')">The Chase</button>
        <button onclick="showAlbum('STYLE')">STYLE</button>
<button onclick="showAlbum('Pretty Please')">Pretty Please</button>
<button onclick="showAlbum('FOCUS')">FOCUS</button>
<button onclick="showAlbum('RUDE')">RUDE</button>
<button onclick="showAlbum('Lemon Tang')">Lemon Tang</button>
</div>
<input id="dateSearch" placeholder="예: 250619" oninput="searchByDate()" />
</header>

<div id="archiveGrid" class="archive-grid"></div>

<script>
let allVideos = [];

function renderVideos(videos){

    const grid = document.getElementById("archiveGrid");

    grid.innerHTML = "";

    videos.forEach(video => {

        const card = document.createElement("a");

        card.className = "archive-card";
        card.href = `https://www.youtube.com/watch?v=${video.videoId}`;
        card.target = "_blank";

        card.innerHTML = `
            <img class="archive-thumb"
                 src="https://img.youtube.com/vi/${video.videoId}/hqdefault.jpg"
                 alt="${video.title}">

            <div class="archive-content">
                <div class="archive-title">${video.title}</div>
                <div class="archive-date">${video.date}</div>
            </div>
        `;

        grid.appendChild(card);
    });
}

function showAlbum(album){

    if(album === "all"){
        renderVideos(allVideos);
        return;
    }

    const filtered = allVideos.filter(v => v.album === album);
    renderVideos(filtered);
}

async function loadVideos() {

    const response = await fetch("video.json");
    allVideos = await response.json();

    renderVideos(allVideos);
}

loadVideos();
function searchByDate(){

    const input = document.getElementById("dateSearch").value;

    if(input === ""){
        renderVideos(allVideos);
        return;
    }

    const filtered = allVideos.filter(v => {

        // 2025-06-19 → 250619 변환
        const compactDate = v.date.replaceAll("-", "").slice(2);

        return compactDate.includes(input);
    });

    renderVideos(filtered);
}
</script>

</body>
</html>
