<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H2HCHIVE</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f6f8;
    color:#222;
}

.container{
    max-width:420px;
    margin:0 auto;
    padding:24px 16px 60px;
}

.header{ margin-bottom:24px; }

.header iframe{
    width:100%;
    height:220px;
    border:none;
    border-radius:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* DDAY */
#dday-container{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
}

#dday-box{ flex:1; text-align:center; }

#dday-text{ font-size:1.1rem; font-weight:800; }
#dday-label{ font-size:1.6rem; font-weight:900; }

.dday-btn{
    background:none;
    border:none;
    font-size:22px;
    font-weight:900;
    cursor:pointer;
}

/* grid */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card{
    background:white;
    border-radius:18px;
    padding:22px 12px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    font-weight:600;
    cursor:pointer;
}

.wide{ grid-column:1 / -1; }

/* mission */
.todo-box{
    background:white;
    border-radius:18px;
    padding:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.todo-header{
    font-weight:700;
    margin-bottom:10px;
}

/* LEMON COUNT */
.lemon-count-box{
    background:white;
    border-radius:18px;
    padding:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    margin-top:20px;
    text-align:center;
    font-weight:800;
}

.lemon-title{
    font-size:1rem;
    font-weight:700;
    margin-bottom:6px;
}

/* sns */
.sns-section{
    margin-top:40px;
    text-align:center;
}

.sns-icons{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:14px;
}

.sns-icons a img{
    width:34px;
    height:34px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
    <div id="dday-container">
        <button class="dday-btn" onclick="moveDday(-1)">‹</button>

        <div id="dday-box">
            <div id="dday-text"></div>
            <div id="dday-label"></div>
        </div>

        <button class="dday-btn" onclick="moveDday(1)">›</button>
    </div>

    <iframe src="https://www.youtube.com/embed/1VqxWNwgf5Q"></iframe>
</div>

<!-- GRID -->
<div class="grid">
    <button class="card wide" onclick="location.href='stream.html'">스밍리스트</button>
    <button class="card" onclick="location.href='guide.html'">가이드</button>
    <button class="card" onclick="location.href='vote.html'">투표</button>
    <button class="card" onclick="location.href='mv.html'">MV</button>
    <button class="card" onclick="location.href='cheer.html'">응원법</button>
    <button class="card" onclick="location.href='schedule.html'">일정</button>
    <button class="card" onclick="location.href='archive.html'">아카이브</button>
</div>

<!-- MISSION -->
<div class="todo-section">
    <div class="todo-box">
        <div class="todo-header">📍 오늘의 미션</div>
        <div id="mission-list"></div>
    </div>
</div>

<!-- LEMON COUNT (FIXED) -->
<div class="lemon-count-box">
    <div class="lemon-title">
        끊기지 않고 스밍을 했다면
    </div>
    <div id="lemon-count-value">
        🍋 Lemon Tang 누적 0회
    </div>
</div>

<!-- SNS -->
<div class="sns-section">
    <div class="todo-header">OFFICIAL ACCOUNTS</div>

    <div class="sns-icons">
        <a href="https://www.instagram.com/hearts2hearts"><img src="instargram-logo.svg"></a>
        <a href="https://x.com/Hearts2Hearts"><img src="x-logo.svg"></a>
        <a href="https://youtube.com/@hearts2hearts.official"><img src="youtube-logo.svg"></a>
        <a href="https://weverse.io/hearts2hearts/highlight"><img src="weverse-logo.svg"></a>
    </div>
</div>

</div>

<script>

/* ===== LEMON COUNT FIX ===== */
const lemonStart = new Date("2026-06-22T18:00:00+09:00");
const cycleLength = 3553;
const lemonTimes = [163, 1030, 1948, 2825];

function updateLemonCount(){

    const now = new Date();
    const elapsed = Math.floor((now - lemonStart) / 1000);

    if(elapsed < 0){
        document.getElementById("lemon-count-value").textContent =
            "🍋 Lemon Tang 누적 0회";
        return;
    }

    const completedCycles = Math.floor(elapsed / cycleLength);
    const currentCycleTime = elapsed % cycleLength;

    let count = completedCycles * 4;

    lemonTimes.forEach(t => {
        if(currentCycleTime >= t) count++;
    });

    document.getElementById("lemon-count-value").textContent =
        `🍋 Lemon Tang 누적 ${count.toLocaleString()}회`;
}

updateLemonCount();
setInterval(updateLemonCount, 1000);

</script>

</body>
</html>
