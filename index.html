<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H2HCHIVE</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f6f8;
    color:#222;
}

.container{
    max-width:420px;
    margin:0 auto;
    padding:24px 16px 60px;
}

.header{
    margin:0 0 24px;
}

.header iframe{
    width:100%;
    height:220px;
    border:none;
    border-radius:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* DDAY */
#dday-box{
    text-align:left;
    margin-bottom:10px;
}

#dday-text{
    font-size:1.1rem;
    font-weight:800;
}

#dday-label{
    font-size:1.6rem;
    font-weight:900;
}

/* grid */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card{
    background:white;
    border:none;
    border-radius:18px;
    padding:22px 12px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
}

.wide{ grid-column:1 / -1; }

/* todo */
.todo-section{ margin:32px 0 40px; }

.todo-box{
    background:white;
    border-radius:18px;
    padding:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    line-height:2;
}

.todo-header{
    font-size:1rem;
    font-weight:700;
    margin-bottom:10px;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
}

/* mission */
.mission-row{
    display:flex;
    gap:10px;
    margin:8px 0;
}

.mission-btn{
    background:#222;
    color:#fff;
    text-decoration:none;
    padding:5px 12px;
    border-radius:999px;
    font-size:.8rem;
    font-weight:600;
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <div id="dday-box">
            <div id="dday-text"></div>
            <div id="dday-label"></div>
        </div>

        <iframe
            src="https://www.youtube.com/embed/F7sGJVUrkjQ"
            title="RUDE!"
            allowfullscreen>
        </iframe>

    </div>

    <!-- GRID -->
    <div class="grid">
        <button class="card wide" onclick="location.href='stream.html'">스밍리스트</button>
        <button class="card" onclick="location.href='guide.html'">가이드</button>
        <button class="card" onclick="location.href='vote.html'">투표</button>
        <button class="card" onclick="location.href='mv.html'">MV</button>
        <button class="card" onclick="location.href='cheer.html'">응원법</button>
        <button class="card" onclick="location.href='schedule.html'">일정</button>
        <button class="card" onclick="location.href='archive.html'">아카이브</button>
    </div>

    <!-- MISSION -->
    <div class="todo-section">
        <div class="todo-box">
            <div class="todo-header">📍 오늘의 미션</div>
            <div id="mission-list"></div>
        </div>
    </div>

</div>

<script>
/* ===== KST ===== */
function toKSTDate(str){
    return new Date(str + "T00:00:00+09:00");
}

/* ===== TODAY ===== */
const now = new Date();
const mission = document.getElementById("mission-list");

/* ===== MISSIONS ===== */
const schedules = [
{
    start:"2026-06-19",
    end:"2026-06-19",
    items:[
        {text:"인가 사전투표하기", link:"https://app.linc.fan/31TL/01KTXG9P7T6YZNFJCHJZMWQ6NX"},
        "Lemon Tang 스밍하기"
    ]
}
];

let currentMission = [];

for(const s of schedules){
    const start = toKSTDate(s.start);
    const end = toKSTDate(s.end);
    end.setHours(23,59,59,999);

    if(now >= start && now <= end){
        currentMission = s.items;
        break;
    }
}

mission.innerHTML = currentMission.length
? currentMission.map(item => {
    if(typeof item === "string"){
        return `<div>✅️ ${item}</div>`;
    }
    return `
    <div class="mission-row">
        <span>✅️ ${item.text}</span>
        <a class="mission-btn" href="${item.link}" target="_blank">바로가기</a>
    </div>`;
}).join("")
: "진행 중인 미션이 없습니다.";

/* ===== D-DAY ===== */
const eventName = "🍋Lemon Tang 컴백";
const targetDate = new Date("2026-06-22T18:00:00+09:00");

const ddayText = document.getElementById("dday-text");
const ddayLabel = document.getElementById("dday-label");

function updateDday(){

    const now = new Date();
    const diff = targetDate - now;

    const totalMin = Math.floor(diff / 1000 / 60);
    const day = Math.floor(totalMin / 60 / 24);
    const hour = Math.floor((totalMin / 60) % 24);
    const min = totalMin % 60;

    ddayText.textContent = eventName;

    if(diff > 0){
        ddayLabel.textContent = `D-${day} (${hour}h ${min}m 남음)`;
    } else {
        ddayLabel.textContent = "D-DAY";
    }
}

updateDday();
setInterval(updateDday, 60000);
</script>

</body>
</html>
