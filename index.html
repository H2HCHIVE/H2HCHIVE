end:"2026-07-07",
items:[

items:[
{

link:"https://m.imbc.com/program/Apply/1000788100000100000?bid=1000788100000100000"
}
]
},
{
start:"2026-07-06:,
end:"2026-07-12",
items:[
{
text:"🗳멜론 주간인기상 투표하기",
link:"http://into.melon.com/weeklyaward"
}
]
},

items:[
{
text:"🗳올해의 브랜드 대상 투표하기",
link:"https://abk.kcforum.co.kr/2026/research.php"
}
]
},
];

const now = new Date();

let currentMission = [];

for (const s of schedules) {
  const start = toKSTDate(s.start);
  const end = toKSTDate(s.end);
  end.setHours(23,59,59,999);

  if (now >= start && now <= end) {
    currentMission.push(...s.items);
  }
}

mission.innerHTML = currentMission.length
  ? currentMission.map(item => {
      if (typeof item === "string") {
        return `<div>✅ ${item}</div>`;
      }
      return `
        <div class="mission-row">
          <span>✅ ${item.text}</span>
          <a class="mission-btn" href="${item.link}" target="_blank">바로가기</a>
        </div>
      `;
    }).join("")
  : "진행 중인 미션이 없습니다.";

/* ===== DDAY ===== */

const ddayList = [
{ name:"🎉 데뷔", date:"2025-02-24T00:00:00+09:00", type:"debut" },
{ name:"🍓 지우 생일", date:"2026-09-07T00:00:00+09:00", type:"dday" },
{ name:"🫛 이안 생일", date:"2026-10-09T00:00:00+09:00", type:"dday" },
{ name:"👾 주은 생일", date:"2026-12-03T00:00:00+09:00", type:"dday" },
{ name:"🌻 에이나 생일", date:"2026-12-20T00:00:00+09:00", type:"dday" }
];

let ddayIndex = 0;

const ddayText = document.getElementById("dday-text");
const ddayLabel = document.getElementById("dday-label");

function updateDday(){

const item = ddayList[ddayIndex];
const now = new Date();
const target = new Date(item.date);

ddayText.textContent = item.name;

const diff = target - now;
const day = Math.ceil(diff / (1000 * 60 * 60 * 24));

if(item.type === "debut"){
const start = new Date(2025, 1, 24);
const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

const diffDays = Math.floor((today - start) / (1000*60*60*24)) + 1;      
ddayLabel.textContent = `D+${diffDays}`;      
return;

}

if (diff > 0) {
  ddayLabel.textContent = `D-${day}`;
} else {
  ddayLabel.textContent = "D-DAY";
}

}

function moveDday(dir){
ddayIndex += dir;

if(ddayIndex < 0) ddayIndex = ddayList.length - 1;
if(ddayIndex >= ddayList.length) ddayIndex = 0;

updateDday();

}

updateDday();

/* ===== LEMON TANG COUNTER ===== */

const startTime = new Date("2026-06-22T18:00:00+09:00");

const CYCLE = 3553;
const lemonTimes = [163, 1030, 1948, 2825];

function getElapsedSeconds(){
  return Math.floor((Date.now() - startTime.getTime()) / 1000);
}

function getCycleInfo(){
  const elapsed = getElapsedSeconds();

  const cycleCount = Math.floor(elapsed / CYCLE);
  const cycleTime = elapsed % CYCLE;

  return { cycleCount, cycleTime };
}

function getLemonCount(){
  const { cycleCount, cycleTime } = getCycleInfo();

  let count = cycleCount * 4;

  for(const t of lemonTimes){
    if(cycleTime >= t){
      count++;
    }
  }

  return count;
}

function updateLemon(){
  const el = document.getElementById("lemon-count");
  if(el) el.textContent = getLemonCount();
}

 setInterval(updateLemon, 1000);
updateLemon();

<script>
const todaySchedule = document.getElementById("today-schedule");

const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth() + 1).padStart(2, "0");
const dd = String(today.getDate()).padStart(2, "0");

const todayKey = `${yyyy}-${mm}-${dd}`;

fetch("./schedule.json")
  .then(res => {
    if (!res.ok) throw new Error("JSON 로드 실패");
    return res.json();
  })
  .then(scheduleData => {
    if (scheduleData && scheduleData[todayKey]) {
      todaySchedule.innerHTML =
        scheduleData[todayKey].replace(/\n/g, "<br>");
    } else {
      todaySchedule.innerHTML = "오늘 일정이 없습니다.";
    }
  })
  .catch(err => {
    console.error(err);
    todaySchedule.innerHTML = "일정 데이터를 불러오지 못했습니다.";
  });
</script>
