<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H2HCHIVE</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f6f8;
    color:#222;
}

.container{
    max-width:420px;
    margin:0 auto;
    padding:24px 16px 60px;
}

/* HEADER */
.header{
    margin-bottom:24px;
}

.header iframe{
    width:100%;
    height:220px;
    border:none;
    border-radius:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* DDAY */
#dday-container{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
}

#dday-box{
    flex:1;
    text-align:center;
}

#dday-text{
    font-size:1rem;
    font-weight:800;
}

#dday-label{
    font-size:1.4rem;
    font-weight:900;
}

.dday-btn{
    background:none;
    border:none;
    font-size:22px;
    font-weight:900;
    cursor:pointer;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card{
    background:white;
    border:none;
    border-radius:18px;
    padding:22px 12px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    font-weight:600;
    cursor:pointer;
}

.wide{ grid-column:1 / -1; }

/* MISSION */
.todo-section{ margin:32px 0; }

.todo-box{
    background:white;
    border-radius:18px;
    padding:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.todo-header{
    font-weight:700;
    margin-bottom:10px;
}

.mission-row{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.mission-btn{
    background:#222;
    color:#fff;
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    text-decoration:none;
}

/* OFFICIAL */
.sns-section{
    margin-top:40px;
    text-align:center;
}

.sns-icons{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:12px;
}

.sns-icons img{
    width:34px;
    height:34px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">

<div id="dday-container">
    <button class="dday-btn" onclick="moveDday(-1)">‹</button>

    <div id="dday-box">
        <div id="dday-text"></div>
        <div id="dday-label"></div>
        <div id="debut-label" style="font-size:0.9rem;margin-top:4px;"></div>
    </div>

    <button class="dday-btn" onclick="moveDday(1)">›</button>
</div>

<iframe src="https://www.youtube.com/embed/F7sGJVUrkjQ" allowfullscreen></iframe>

</div>

<!-- GRID -->
<div class="grid">
    <button class="card wide" onclick="location.href='stream.html'">스밍리스트</button>
    <button class="card" onclick="location.href='guide.html'">가이드</button>
    <button class="card" onclick="location.href='vote.html'">투표</button>
    <button class="card" onclick="location.href='mv.html'">MV</button>
    <button class="card" onclick="location.href='cheer.html'">응원법</button>
    <button class="card" onclick="location.href='schedule.html'">일정</button>
    <button class="card" onclick="location.href='archive.html'">아카이브</button>
</div>

<!-- MISSION -->
<div class="todo-section">
    <div class="todo-box">
        <div class="todo-header">📍 오늘의 미션</div>
        <div id="mission-list"></div>
    </div>
</div>

<!-- OFFICIAL ACCOUNTS -->
<div class="sns-section">
    <div class="todo-header">OFFICIAL ACCOUNTS</div>

    <div class="sns-icons">
        <a href="https://www.instagram.com/hearts2hearts" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg">
        </a>

        <a href="https://x.com/Hearts2Hearts" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg">
        </a>

        <a href="https://youtube.com/@hearts2hearts.official" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg">
        </a>

        <a href="https://weverse.io/hearts2hearts" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/weverse.svg">
        </a>
    </div>
</div>

</div>

<script>

/* =======================
   MISSIONS
======================= */
function toKSTDate(str){
    return new Date(str + "T00:00:00+09:00");
}

const mission = document.getElementById("mission-list");

const schedules = [
{
    start:"2026-06-19",
    end:"2026-06-19",
    items:[
        {text:"인가 사전투표하기", link:"https://app.linc.fan/31TL/01KTXG9P7T6YZNFJCHJZMWQ6NX"},
        "Lemon Tang 스밍하기"
    ]
}
];

const now = new Date();
let currentMission = [];

for(const s of schedules){
    const start = toKSTDate(s.start);
    const end = toKSTDate(s.end);
    end.setHours(23,59,59,999);

    if(now >= start && now <= end){
        currentMission = s.items;
        break;
    }
}

mission.innerHTML = currentMission.length
? currentMission.map(i =>
    typeof i === "string"
    ? `<div>✅ ${i}</div>`
    : `<div class="mission-row"><span>✅ ${i.text}</span><a class="mission-btn" href="${i.link}" target="_blank">바로가기</a></div>`
).join("")
: "진행 중인 미션이 없습니다.";

/* =======================
   DDAY + SLIDER
======================= */

const ddayList = [
    { name:"🍋 Lemon Tang 컴백", date:"2026-06-22T18:00:00+09:00" },
    { name:"🍓 지우 생일", date:"2026-09-07T00:00:00+09:00" },
    { name:"🫛 이안 생일", date:"2026-10-09T00:00:00+09:00" },
    { name:"👾 주은 생일", date:"2026-12-03T00:00:00+09:00" },
    { name:"🌻 에이나 생일", date:"2026-12-20T00:00:00+09:00" }
];

let ddayIndex = 0;

const ddayText = document.getElementById("dday-text");
const ddayLabel = document.getElementById("dday-label");
const debutLabel = document.getElementById("debut-label");

/* D+ 데뷔일 */
const debutDate = new Date("2025-02-24T00:00:00+09:00");

function updateDday(){

    const item = ddayList[ddayIndex];
    const target = new Date(item.date);
    const now = new Date();

    const diff = target - now;
    const day = Math.ceil(diff / (1000*60*60*24));

    ddayText.textContent = item.name;
    ddayLabel.textContent = diff > 0 ? `D-${day}` : "D-DAY";

    /* D+ */
    const debutDiff = now - debutDate;
    const debutDay = Math.floor(debutDiff / (1000*60*60*24)) + 1;

    debutLabel.textContent = `Debut D+${debutDay}`;
}

function moveDday(dir){
    ddayIndex += dir;

    if(ddayIndex < 0) ddayIndex = ddayList.length - 1;
    if(ddayIndex >= ddayList.length) ddayIndex = 0;

    updateDday();
}

/* swipe */
let startX = 0;
const box = document.getElementById("dday-box");

box.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

box.addEventListener("touchend", e=>{
    const endX = e.changedTouches[0].clientX;

    if(startX - endX > 30) moveDday(1);
    if(endX - startX > 30) moveDday(-1);
});

updateDday();

</script>

</body>
</html>
