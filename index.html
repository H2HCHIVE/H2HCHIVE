<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H2HCHIVE</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f6f8;
    color:#222;
}

.container{
    max-width:420px;
    margin:0 auto;
    padding:24px 16px 60px;
}

.header{
    margin:0 0 24px;
}

.header iframe{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    border-radius:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card{
    background:white;
    border:none;
    border-radius:18px;
    padding:22px 12px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
}

.card:active{
    background:#eee;
}

/* SNS */

.sns-section{
    margin:48px 0 24px;
}

.sns-title{
    text-align:center;
    font-size:0.85rem;
    font-weight:600;
    color:#888;
    letter-spacing:1.5px;
    margin-bottom:16px;
}

.sns-grid{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

.sns-grid a{
    display:flex;
    align-items:center;
    justify-content:center;
}

.sns-grid img{
    width:32px;
    height:32px;
    object-fit:contain;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <iframe
            src="https://www.youtube.com/embed/F7sGJVUrkjQ"
            title="RUDE!"
            allowfullscreen>
        </iframe>
    </div>

    <div class="grid">

        <button class="card" onclick="location.href='stream.html'">
            스밍리스트
        </button>

        <button class="card" onclick="location.href='guide.html'">
            가이드
        </button>

        <button class="card" onclick="location.href='cheer.html'">
            응원법
        </button>

        <button class="card" onclick="location.href='mv.html'">
            MV
        </button>

        <button class="card" onclick="location.href='etc.html'">
            ETC
        </button>

    </div>

    <div class="sns-section">

        <div class="sns-title">
            OFFICIAL ACCOUNTS
        </div>

        <div class="sns-grid">

            <a href="https://www.instagram.com/hearts2hearts" target="_blank">
                <img src="인스타그램 아이콘.svg" alt="Instagram">
            </a>

            <a href="https://x.com/Hearts2Hearts" target="_blank">
                <img src="X 로고.svg" alt="X">
            </a>

            <a href="https://youtube.com/@hearts2hearts.official" target="_blank">
                <img src="유튜브 아이콘.svg" alt="YouTube">
            </a>

            <a href="https://weverse.io/hearts2hearts/highlight" target="_blank">
                <img src="위버스 아이콘.svg" alt="Weverse">
            </a>

        </div>

    </div>

</div>

</body>
</html>
