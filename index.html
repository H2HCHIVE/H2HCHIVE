<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H2HCHIVE</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f6f8;
    color:#222;
}

.container{
    max-width:420px;
    margin:0 auto;
    padding:24px 16px 60px;
}

.header{
    text-align:center;
    margin:24px 0 32px;
}

.header h1{
    margin:0;
    font-size:2rem;
}

.header p{
    color:#666;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card{
    background:white;
    border:none;
    border-radius:18px;
    padding:22px 12px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
}

.card:active{
    background:#eee;
}

.content{
    margin-top:24px;
    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.sns-title{
    text-align:center;
    margin:30px 0 12px;
}

.sns-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.sns-btn{
    background:white;
    text-decoration:none;
    color:#222;
    text-align:center;
    padding:16px;
    border-radius:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    font-weight:600;
}

.sns-btn:active{
    background:#eee;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>H2HCHIVE</h1>
        <p>원하는 카테고리를 선택하세요.</p>
    </div>

    <div class="grid">
        <button class="card" onclick="showContent('stream')">스밍리스트</button>
        <button class="card" onclick="showContent('guide')">가이드</button>
        <button class="card" onclick="showContent('cheer')">응원법</button>
        <button class="card" onclick="showContent('mv')">MV</button>
        <button class="card" onclick="showContent('etc')">ETC</button>
    </div>

    <div class="content" id="content">
        <h2>환영합니다</h2>
        <p>위 카테고리를 눌러 내용을 확인하세요.</p>
    </div>

    <h3 class="sns-title">OFFICIAL SNS</h3>

    <div class="sns-grid">
        <a href="https://www.instagram.com/hearts2hearts" target="_blank" class="sns-btn">Instagram</a>

        <a href="https://x.com/Hearts2Hearts" target="_blank" class="sns-btn">Twitter</a>

        <a href="https://youtube.com/@hearts2hearts.official" target="_blank" class="sns-btn">YouTube</a>

        <a href="https://weverse.io/hearts2hearts/highlight" target="_blank" class="sns-btn">Weverse</a>
    </div>

</div>

<script>
const data = {
stream: "<h2>스밍리스트</h2><p>여기에 스트리밍 링크와 안내를 입력하세요.</p>",
guide: "<h2>가이드</h2><p>팬 활동 가이드를 입력하세요.</p>",
cheer: "<h2>응원법</h2><p>응원법 내용을 입력하세요.</p>",
mv: "<h2>MV</h2><p>뮤직비디오 링크를 입력하세요.</p>",
etc: "<h2>ETC</h2><p>기타 자료를 입력하세요.</p>"
};

function showContent(key){
    document.getElementById('content').innerHTML = data[key];
}
</script>

</body>
</html>
