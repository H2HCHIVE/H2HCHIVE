<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스케줄 | H2HCHIVE</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f6f8;
    color:#222;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:420px;
    padding:14px 12px 30px;
}

.tabs{
    display:flex;
    gap:6px;
    margin-bottom:12px;
}

.tab{
    flex:1;
    text-align:center;
    padding:8px 0;
    background:white;
    border-radius:10px;
    font-size:0.85rem;
    cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.tab.active{
    background:#222;
    color:white;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.month{
    font-size:1.3rem;
    font-weight:700;
}

.btn{
    font-size:1.6rem;
    border:none;
    background:none;
    cursor:pointer;
}

.filters{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

.filters button{
    border:none;
    background:white;
    padding:6px 10px;
    border-radius:8px;
    font-size:0.8rem;
    cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.filters button.active{
    background:#222;
    color:white;
}

.weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    font-size:0.85rem;
    font-weight:600;
    margin-bottom:6px;
}

.weekdays div:nth-child(1){ color:red; }
.weekdays div:nth-child(7){ color:blue; }

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.day{
    background:white;
    border-radius:12px;
    padding:12px 0;
    text-align:center;
    font-size:0.95rem;
    cursor:pointer;
    position:relative;
}

.today{
    border:2px solid red;
    font-weight:700;
}

.dot{
    width:6px;
    height:6px;
    background:#999;
    border-radius:50%;
    margin:4px auto 0;
}

.today-dot{
    background:red;
}

.event-box{
    margin-top:12px;
    background:white;
    border-radius:14px;
    padding:14px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    min-height:50px;
}

.line{
    display:block;
    margin-bottom:6px;
}

.highlight{
    font-weight:800;
    background:#fff3b0;
    padding:2px 4px;
    border-radius:6px;
}

.dim-line{
    opacity:0.25;
}

/* 리스트 스타일 추가 */
.list{
    background:white;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<div class="container">

    <div class="tabs">
        <div class="tab active">📅 캘린더</div>
        <div class="tab">📋 리스트</div>
        <div class="tab">🔥 하이라이트</div>
    </div>

    <div id="calendarView">

        <div class="header">
            <button class="btn" onclick="prev()">←</button>
            <div class="month" id="month"></div>
            <button class="btn" onclick="next()">→</button>
        </div>

        <div class="filters">
            <button onclick="setFilter('all', this)" class="active">전체</button>
            <button onclick="setFilter('📺', this)">📺</button>
            <button onclick="setFilter('📻', this)">📻</button>
            <button onclick="setFilter('✒️', this)">✒️</button>
            <button onclick="setFilter('🎤', this)">🎤</button>
            <button onclick="setFilter('💿', this)">💿</button>
            <button onclick="setFilter('▶️', this)">▶️</button>
            <button onclick="setFilter('🗓', this)">🗓</button>
        </div>

        <div class="weekdays">
            <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>

        <div class="calendar" id="calendar"></div>

        <div class="event-box" id="eventBox">날짜를 클릭하세요</div>

    </div>

    <div id="listView" style="display:none;"></div>
    <div id="highlightView" style="display:none;"></div>

</div>

<script>

let date = new Date();
let data = {};
let filter = 'all';

fetch('schedule.json')
.then(r=>r.json())
.then(j=>{
    data = j;
    render();
});

/* 캘린더 (변경 없음) */
function render(){

    const y = date.getFullYear();
    const m = date.getMonth();

    document.getElementById('month').innerText =
        `${y}년 ${m+1}월`;

    const cal = document.getElementById('calendar');
    cal.innerHTML = '';

    const first = new Date(y,m,1).getDay();
    const last = new Date(y,m+1,0).getDate();

    const today = new Date();
    const todayKey =
        `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    for(let i=0;i<first;i++) cal.innerHTML += `<div></div>`;

    for(let d=1; d<=last; d++){

        const key =
            `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        const text = data[key] || '';
        const has = text.length > 0;

        const isToday = key === todayKey;

        cal.innerHTML += `
            <div class="day ${isToday?'today':''}"
                onclick="show('${key}')">
                ${d}
                ${isToday ? '<div class="dot today-dot"></div>' : (has ? '<div class="dot"></div>' : '')}
            </div>
        `;
    }

    renderList();
    renderHighlight();
}

/* 일정 표시 (변경 없음) */
function show(key){

    const text = data[key] || "일정 없음";
    const lines = text.split('\n');

    document.getElementById('eventBox').innerHTML =
        lines.map(line=>{

            if(filter==='all')
                return `<div class="line">${line}</div>`;

            if(line.includes(filter))
                return `<div class="line highlight">${line}</div>`;

            return `<div class="line dim-line">${line}</div>`;

        }).join('');
}

/* ✔ 리스트 (줄바꿈만 수정) */
function renderList(){
    const el = document.getElementById('listView');

    let html = '';

    Object.keys(data).forEach(k=>{
        html += `
            <div class="list">
                <b>${k}</b><br>
                ${data[k].replaceAll('\n','<br>')}
            </div>
        `;
    });

    el.innerHTML = html;
}

/* ✔ 하이라이트 (줄바꿈만 수정) */
function renderHighlight(){
    const el = document.getElementById('highlightView');

    let html = '';

    Object.keys(data).forEach(k=>{
        if(
            data[k].includes('💿') ||
            data[k].includes('🎉')
        ){
            html += `
                <div class="list">
                    <b>${k}</b><br>
                    ${data[k].replaceAll('\n','<br>')}
                </div>
            `;
        }
    });

    el.innerHTML = html;
}

/* 이동 */
function prev(){ date.setMonth(date.getMonth()-1); render(); }
function next(){ date.setMonth(date.getMonth()+1); render(); }

</script>

</body>
</html>
