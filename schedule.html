<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스케줄 | H2HCHIVE</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f6f8;
    color:#222;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:420px;
    padding:14px 12px 30px;
}

/* 상단 */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.month{
    font-size:1.3rem;
    font-weight:700;
}

.btn{
    font-size:1.6rem;
    border:none;
    background:none;
    cursor:pointer;
}

/* 요일 */
.weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    font-size:0.85rem;
    font-weight:600;
    margin-bottom:6px;
}

.weekdays div:nth-child(1){
    color:red;
}

.weekdays div:nth-child(7){
    color:blue;
}

/* 달력 */
.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.day{
    background:white;
    border-radius:12px;
    padding:12px 0;
    text-align:center;
    font-size:0.95rem;
    cursor:pointer;
    position:relative;
}

/* 점 기본 (회색) */
.dot{
    width:6px;
    height:6px;
    background:#999;
    border-radius:50%;
    margin:4px auto 0;
}

/* 오늘 날짜 */
.today{
    border:2px solid red;
    font-weight:700;
}

/* 오늘 점 (빨간색으로 덮어씀) */
.today-dot{
    background:red !important;
}
</style>
</head>

<body>

<div class="container">

    <!-- 상단 -->
    <div class="header">
        <button class="btn" onclick="prev()">←</button>
        <div class="month" id="month"></div>
        <button class="btn" onclick="next()">→</button>
    </div>

    <!-- 요일 -->
    <div class="weekdays">
        <div>일</div>
        <div>월</div>
        <div>화</div>
        <div>수</div>
        <div>목</div>
        <div>금</div>
        <div>토</div>
    </div>

    <!-- 달력 -->
    <div class="calendar" id="calendar"></div>

</div>

<script>
let date = new Date();
let data = {};

fetch('schedule.json')
.then(res => res.json())
.then(json => {
    data = json;
    render();
});

function render(){
    const y = date.getFullYear();
    const m = date.getMonth();

    document.getElementById('month').innerText =
        `${y}년 ${m+1}월`;

    const first = new Date(y, m, 1).getDay();
    const last = new Date(y, m+1, 0).getDate();

    const cal = document.getElementById('calendar');
    cal.innerHTML = '';

    const today = new Date();
    const todayKey =
        `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    for(let i=0;i<first;i++){
        cal.innerHTML += `<div></div>`;
    }

    for(let d=1; d<=last; d++){

        const key =
            `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        const hasEvent = data[key];
        const isToday = key === todayKey;

        cal.innerHTML += `
            <div class="day ${isToday ? 'today' : ''}">
                ${d}

                ${hasEvent ? '<div class="dot"></div>' : ''}

                ${isToday ? '<div class="dot today-dot"></div>' : ''}
            </div>
        `;
    }
}

function prev(){
    date.setMonth(date.getMonth()-1);
    render();
}

function next(){
    date.setMonth(date.getMonth()+1);
    render();
}
</script>

</body>
</html>
