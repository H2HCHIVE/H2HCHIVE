<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스케줄 | H2HCHIVE</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f6f8;
    color:#222;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:420px;
    padding:14px 12px 30px;
}

/* 상단 */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.month{
    font-size:1.3rem;
    font-weight:700;
}

.btn{
    font-size:1.6rem;
    border:none;
    background:none;
    cursor:pointer;
}

/* 요일 */
.weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    font-size:0.85rem;
    font-weight:600;
    margin-bottom:6px;
}

.weekdays div:nth-child(1){ color:red; }
.weekdays div:nth-child(7){ color:blue; }

/* 달력 */
.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

/* 날짜 */
.day{
    background:white;
    border-radius:12px;
    padding:10px 6px;
    text-align:center;
    font-size:0.95rem;
    min-height:52px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    position:relative;
}

/* 오늘 */
.today{
    border:2px solid red;
    font-weight:700;
}

/* 일정 카드 */
.event{
    margin-top:4px;
    font-size:0.65rem;
    padding:3px 4px;
    border-radius:6px;
    color:#fff;
    line-height:1.2;
}

/* 색상 타입 */
.comeback{
    background:#e74c3c; /* 빨강 */
}

.music{
    background:#3498db; /* 파랑 */
}

.vote{
    background:#f1c40f; /* 노랑 */
    color:#333;
}

.etc{
    background:#7f8c8d; /* 회색 */
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <button class="btn" onclick="prev()">←</button>
        <div class="month" id="month"></div>
        <button class="btn" onclick="next()">→</button>
    </div>

    <div class="weekdays">
        <div>일</div><div>월</div><div>화</div>
        <div>수</div><div>목</div><div>금</div><div>토</div>
    </div>

    <div class="calendar" id="calendar"></div>

</div>

<script>
let date = new Date();
let data = {};

fetch('schedule.json')
.then(res => res.json())
.then(json => {
    data = json;
    render();
});

function getType(text){
    if(text.includes("컴백")) return "comeback";
    if(text.includes("투표")) return "vote";
    if(text.includes("스밍") || text.includes("음원")) return "music";
    return "etc";
}

function render(){
    const y = date.getFullYear();
    const m = date.getMonth();

    document.getElementById('month').innerText =
        `${y}년 ${m+1}월`;

    const first = new Date(y, m, 1).getDay();
    const last = new Date(y, m+1, 0).getDate();

    const cal = document.getElementById('calendar');
    cal.innerHTML = '';

    const today = new Date();
    const todayKey =
        `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    for(let i=0;i<first;i++){
        cal.innerHTML += `<div></div>`;
    }

    for(let d=1; d<=last; d++){

        const key =
            `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        const event = data[key];
        const isToday = key === todayKey;

        const type = event ? getType(event) : "";

        cal.innerHTML += `
            <div class="day ${isToday ? 'today' : ''}">
                <div>${d}</div>
                ${event ? `<div class="event ${type}">${event}</div>` : ''}
            </div>
        `;
    }
}
</script>

</body>
</html>
