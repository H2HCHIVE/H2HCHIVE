<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스케줄 | H2HCHIVE</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f6f8;
    color:#222;
    display:flex;
    justify-content:center;
}

/* 전체 컨테이너 */
.container{
    width:100%;
    max-width:420px;
    padding:16px 12px 30px;
}

/* 상단 */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
}

.month{
    font-size:1.3rem;
    font-weight:700;
}

.btn{
    font-size:1.6rem;
    border:none;
    background:none;
    cursor:pointer;
}

/* 달력 */
.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.day{
    background:white;
    border-radius:12px;
    padding:14px 0;
    text-align:center;
    font-size:0.95rem;
    cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.day:hover{
    background:#eee;
}

/* 일정 박스 */
.event-box{
    margin-top:14px;
    background:white;
    border-radius:14px;
    padding:14px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    min-height:50px;
}
</style>
</head>

<body>

<div class="container">

    <!-- 상단 -->
    <div class="header">
        <button class="btn" onclick="prev()">←</button>
        <div class="month" id="month"></div>
        <button class="btn" onclick="next()">→</button>
    </div>

    <!-- 달력 -->
    <div class="calendar" id="calendar"></div>

    <!-- 일정 표시 -->
    <div class="event-box" id="eventBox">
        날짜를 클릭하세요
    </div>

</div>

<script>
let date = new Date();
let data = {};

/* JSON 불러오기 */
fetch('schedule.json')
.then(res => res.json())
.then(json => {
    data = json;
    render();
});

/* 달력 생성 */
function render(){
    const y = date.getFullYear();
    const m = date.getMonth();

    document.getElementById('month').innerText =
        `${y}년 ${m+1}월`;

    const first = new Date(y, m, 1).getDay();
    const last = new Date(y, m+1, 0).getDate();

    const cal = document.getElementById('calendar');
    cal.innerHTML = '';

    for(let i=0;i<first;i++){
        cal.innerHTML += `<div></div>`;
    }

    for(let d=1; d<=last; d++){

        const key =
            `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        cal.innerHTML += `
            <div class="day" onclick="show('${key}')">
                ${d}
            </div>
        `;
    }
}

/* 일정 표시 */
function show(key){
    document.getElementById('eventBox').innerText =
        data[key] || "일정 없음";
}

/* 이전 달 */
function prev(){
    date.setMonth(date.getMonth()-1);
    render();
}

/* 다음 달 */
function next(){
    date.setMonth(date.getMonth()+1);
    render();
}
</script>

</body>
</html>
