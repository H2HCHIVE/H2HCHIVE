<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스케줄 | H2HCHIVE</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f6f8;
    color:#222;
}

.container{
    max-width:420px;
    margin:0 auto;
    padding:24px 16px 60px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
}

.month{
    font-size:1.2rem;
    font-weight:700;
}

.btn{
    font-size:1.5rem;
    border:none;
    background:none;
    cursor:pointer;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
}

.day{
    background:white;
    border-radius:10px;
    padding:10px 0;
    text-align:center;
    cursor:pointer;
}

.day:hover{
    background:#eee;
}

.event-box{
    margin-top:20px;
    background:white;
    border-radius:14px;
    padding:16px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    min-height:60px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <button class="btn" onclick="prev()">←</button>
        <div class="month" id="month"></div>
        <button class="btn" onclick="next()">→</button>
    </div>

    <div class="calendar" id="calendar"></div>

    <div class="event-box" id="eventBox">
        날짜를 클릭하세요
    </div>

</div>

<script>
let date = new Date();
let data = {};

fetch('schedule.json')
.then(res => res.json())
.then(json => {
    data = json;
    render();
});

function render(){
    const y = date.getFullYear();
    const m = date.getMonth();

    document.getElementById('month').innerText =
        `${y}년 ${m+1}월`;

    const first = new Date(y, m, 1).getDay();
    const last = new Date(y, m+1, 0).getDate();

    const cal = document.getElementById('calendar');
    cal.innerHTML = '';

    for(let i=0;i<first;i++){
        cal.innerHTML += `<div></div>`;
    }

    for(let d=1; d<=last; d++){

        const key =
            `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        cal.innerHTML += `
            <div class="day" onclick="show('${key}')">
                ${d}
            </div>
        `;
    }
}

function show(key){
    document.getElementById('eventBox').innerText =
        data[key] || "일정 없음";
}

function prev(){
    date.setMonth(date.getMonth()-1);
    render();
}

function next(){
    date.setMonth(date.getMonth()+1);
    render();
}
</script>

</body>
</html>
